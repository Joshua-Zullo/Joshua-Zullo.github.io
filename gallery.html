<!DOCTYPE HTML>
<html>
    <head>
        <title>
            Joshua's Website Gallery
        </title>

        <style type = "text/css">

            body {
                background: rgb(37, 37, 37);
                color: rgb(45, 45, 45);
                padding: 10px;
                font-family: arial;
              
            }
            header {
                font-size: 1.5em;
                font-weight: bold;
            }
            
            #all-contents {
                max-width: 800px;
                margin: auto;
            }
    
            /* navigation menu */
          

            nav {
                background: rgb(230, 199, 0);
                margin: 0 auto;
                margin-bottom: 20px;
                display: flex;
                padding: 10px;
                border-radius: 5px;
            }

            h1 {
                display: flex;
                align-items: center;
                color: rgb(47, 47, 47);
                flex: 1;
                margin:0;
            }
            #nav-ul {
                list-style-image: none;
            }
            .nav-li {
                display: inline-block;
                padding: 0 10px;
                color: black;
            }
            .nav-a {
                text-decoration: none;
                color: black;
            }
    
            /* main container area beneath menu */
            main {
                background: rgb(131, 131, 131);
                display: flex;
                border-radius: 5px;
            }
            .content {
                flex: 1;
                padding: 15px;
            }

                /* portfolio styles */
            .content h1 {
                color: black;
            }
            
            #portfolio {
                list-style-type: none;
                padding-left: 0;
            }
            
            #portfolio li {
                background: #fff;
                padding: 10px;
                border-radius: 10px;
                margin-bottom: 10px;
            }
            
            #portfolio li:hover {
                background: #eee;
            } 
            
            #portfolio a {
                text-decoration: none;
                color: #454545;
            }
        </style>
    </head>

    <body>
        <div id = "all-contents">
            <nav>
               <h1>Joshua's Website</h1>
                <ul id="nav-ul">
                    <li class="nav-li">
                        <a class="nav-a" href="index.html">Home</a>
                    </li>
                    <li class="nav-li">
                        <a class="nav-a" href="portfolio.html">Portfolio</a>
                    </li>

                    <li class = "nav-li">
                        <a href = "gallery.html"> Image Gallery</a>
                    </li>
                </ul>
            </nav>
        </div>

        <main>
            <div class = "content">

            </div>
        </main>

    </body>       

</html>
